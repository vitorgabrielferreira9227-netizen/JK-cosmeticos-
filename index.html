<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JK Cosméticos - Catálogo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        #finalizar {
            display: block;
            background: #25d366;
            /* verde WhatsApp */
            color: #ffffff;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            margin-top: 10px;
            font-weight: 600;
        }


        /* CARRINHO PADRÃO (PC) */
        /* CARRINHO PADRÃO (PC) */
        #carrinho {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ffffff;
            /* branco no container */
            color: #333333;
            /* texto escuro */
            width: 280px;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            font-size: 14px;
            z-index: 999;
        }

        @media (max-width: 600px) {
            .produto {
                padding: 10px;
            }

            .produto img {
                max-width: 100px;
            }
        }


        @media (max-width: 768px) {
            #carrinho {
                left: 0;
                right: 0;
                bottom: 0;
                width: 100%;
                border-radius: 20px 20px 0 0;
                padding: 12px 15px;
                background: #ffffff
            }

            body {
                padding-bottom: 200px;

            }

            #lista-carrinho {
                max-height: 80px;
                overflow-y: auto;
            }

            body {
                padding-bottom: 200px;
                /* evita o carrinho tampar produtos */
            }
        }


        :root {
            --boticario: #3a5a40;
            --eudora: #4a1533;
            --bg-body: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* Topo Estilo Canva / JK */
        header {
            background: var(--white);
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .btn-catalogo {
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            color: var(--white);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .boticario {
            background-color: var(--boticario);
        }

        .eudora {
            background-color: var(--eudora);
        }

        .insta {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        .btn-catalogo:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
        }

        /* Seção de Chamada */
        .chamada {
            text-align: center;
            padding: 40px 20px;
        }

        .chamada h2 {
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .seta-animada {
            font-size: 2.5rem;
            color: #999;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-10px);
            }

            60% {
                transform: translateY(-5px);
            }
        }

        /* Grade de Produtos Dinâmica */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .produto-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            padding: 15px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            transition: 0.3s;
            position: relative;
        }

        .produto-card:hover {
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }

        .img-box {
            width: 100%;
            height: 250px;
            background: #f9f9f9;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .img-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .marca-tag {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .produto-nome {
            font-size: 1.1rem;
            margin: 10px 0;
            color: #444;
            height: 2.4em;
            overflow: hidden;
        }

        .preco {
            font-size: 1.5rem;
            font-weight: 600;
            color: #222;
            margin-bottom: 15px;
        }

        .btn-whats {
            background-color: #25d366;
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        /* ===== AJUSTE FINO DO CARRINHO (MOBILE) ===== */
        @media (max-width: 768px) {

            #carrinho {
                padding: 8px 12px;
                font-size: 13px;
            }

            #carrinho h3 {
                font-size: 15px;
                margin: 4px 0;
            }

            #lista-carrinho {
                max-height: 60px;
                /* diminui a caixa da lista */
                overflow-y: auto;
                padding-left: 15px;
                margin: 5px 0;
            }

            #lista-carrinho li {
                font-size: 12px;
                margin-bottom: 3px;
            }

            .total {
                font-size: 14px;
                margin: 5px 0;
            }

            #finalizar {
                padding: 8px;
                font-size: 13px;
                border-radius: 8px;
            }

            body {
                padding-bottom: 140px;
                /* reduz espaço vazio */
            }
        }


        .btn-whats:hover {
            background-color: #128c7e;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>

    <!-- CARRINHO -->
    <div id="carrinho">
        <h3>🛒 Meu Carrinho</h3>
        <ul id="lista-carrinho"></ul>
        <p class="total">Total: R$ <span id="total">0.00</span></p>
        <a id="finalizar" href="#" target="_blank">Finalizar no WhatsApp</a>
    </div>


    <header>
        <a href="https://drive.google.com/file/d/1KX5CAUKiuupJO9fRhOoJ7aP_8KeFvIM6/view?usp=drive_link"
            class="btn-catalogo boticario">
            <i class="fas fa-leaf"></i> Catálogo Boticário
        </a>
        <a href="https://drive.google.com/file/d/1RcFvg94ZjS_sGlsP2akrm9DwkjZLWKCI/view?usp=drive_link"
            class="btn-catalogo eudora">
            <i class="fas fa-star"></i> Catálogo Eudora
        </a>
        <a href="https://www.instagram.com/jk.cosmeticos_?igsh=MXhyaTFyNHF0emthdA==" class="btn-catalogo insta">
            <i class="fab fa-instagram"></i> Instagram
        </a>
    </header>

    <div class="chamada">
        <h2>Produtos a pronta entrega</h2>
        <div class="seta-animada"><i class="fas fa-chevron-down"></i></div>
    </div>

    <div class="container" id="produtos"></div>

            </body>
<script>
let carrinho = [];
let total = 0;

function adicionarCarrinho(nome, preco) {
    carrinho.push({ nome, preco });
    total += preco;
    atualizarCarrinho();
}

function atualizarCarrinho() {
    const lista = document.getElementById("lista-carrinho");
    const totalSpan = document.getElementById("total");
    const finalizar = document.getElementById("finalizar");

    lista.innerHTML = "";

    carrinho.forEach(item => {
        const li = document.createElement("li");
        li.textContent = `${item.nome} - R$ ${item.preco.toFixed(2)}`;
        lista.appendChild(li);
    });

    totalSpan.textContent = total.toFixed(2);

    let mensagem = "Oi! Quero comprar:%0A";
    carrinho.forEach(item => {
        mensagem += `- ${item.nome} (R$ ${item.preco.toFixed(2)})%0A`;
    });
    mensagem += `%0ATotal: R$ ${total.toFixed(2)}`;

    finalizar.href = "https://wa.me/5567999999999?text=" + mensagem;
}

const URL =  "https://sheetdb.io/api/v1/53lc2lf6id1xw";
fetch(URL)
.then(res => res.json())
.then(data => {
    const container = document.getElementById("produtos");

    data.forEach(produto => {
        const card = document.createElement("div");
        card.className = "produto-card";

        card.innerHTML = `
            <span class="marca-tag">${produto.marca}</span>
            <div class="img-box">
                <img src="${produto.imagem}">
            </div>
            <div class="produto-nome">${produto.nome}</div>
            <div class="preco">R$ ${parseFloat(produto.preco).toFixed(2)}</div>
       <button class="btn-whats" onclick='adicionarCarrinho(${JSON.stringify(produto.nome)}, ${produto.preco})'>
                <i class="fas fa-cart-plus"></i> Adicionar ao carrinho
            </button>
        `;

        container.appendChild(card);
    });
});
</script>

</html>
